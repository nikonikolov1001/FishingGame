<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="500" viewBox="0 0 1100 500">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f7ea8" />
    </marker>
    <style>
      .state { fill:#e8f7ff; stroke:#1f7ea8; stroke-width:3; }
      .text { font: 18px Arial, sans-serif; fill:#0d2230; }
      .small { font: 15px Arial, sans-serif; fill:#10394d; }
      .line { stroke:#1f7ea8; stroke-width:3; fill:none; marker-end:url(#arrow); }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#f7fbfe"/>
  <text x="40" y="40" class="text">FishingGame Fish FSM</text>
  <line x1="30" y1="120" x2="100" y2="120" class="line"/>
  <text x="32" y="102" class="small">Initial</text>

  <circle cx="170" cy="120" r="62" class="state"/>
  <text x="140" y="126" class="text">SWIM</text>

  <circle cx="390" cy="120" r="72" class="state"/>
  <text x="322" y="126" class="text">NOTICE_BAIT</text>

  <circle cx="655" cy="120" r="72" class="state"/>
  <text x="605" y="126" class="text">APPROACH</text>

  <circle cx="910" cy="120" r="62" class="state"/>
  <text x="880" y="126" class="text">BITE</text>

  <circle cx="530" cy="340" r="68" class="state"/>
  <text x="487" y="346" class="text">HOOKED</text>

  <circle cx="830" cy="340" r="96" class="state"/>
  <text x="744" y="346" class="text">ESCAPE_ATTEMPT</text>

  <path d="M232 120 H312" class="line"/>
  <text x="235" y="95" class="small">hook in notice radius</text>

  <path d="M462 120 H575" class="line"/>
  <text x="480" y="95" class="small">distance reduced</text>

  <path d="M727 120 H840" class="line"/>
  <text x="746" y="95" class="small">bite radius reached</text>

  <path d="M900 180 C860 250 700 290 590 320" class="line"/>
  <text x="730" y="255" class="small">bite timer ends</text>

  <path d="M598 340 H726" class="line"/>
  <text x="620" y="318" class="small">escape timer ends</text>

  <path d="M735 385 C630 455 335 445 205 180" class="line"/>
  <text x="410" y="450" class="small">far from hook again</text>

  <path d="M655 190 C640 250 610 270 575 292" class="line"/>
  <text x="610" y="250" class="small">hook close enough</text>

  <path d="M390 195 C360 265 245 260 202 176" class="line"/>
  <text x="240" y="262" class="small">hook too far away</text>

  <path d="M655 48 C575 10 465 10 392 48" class="line"/>
  <text x="470" y="18" class="small">bait lost</text>
</svg>
